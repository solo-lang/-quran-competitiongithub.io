body { font-family:'Tajawal',sans-serif; background:var(--dark); min-height:100vh; color:white; direction:rtl; }
.search-page { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; background: radial-gradient(ellipse 800px 600px at 50% 40%, rgba(13,51,70,0.8) 0%, transparent 70%), linear-gradient(160deg,#050e1a 0%,#0a1e35 50%,#050e1a 100%); position:relative; overflow:hidden; }

.logo-area { text-align:center; margin-bottom:50px; }

.divider-gold::after  { background:linear-gradient(to left,  transparent, rgba(196,155,55,0.5)); }

.search-box { width:100%; max-width:520px; background:rgba(255,255,255,0.04); border:1px solid rgba(196,155,55,0.30); border-radius:4px; padding:36px 32px; backdrop-filter:blur(10px); position:relative; }
.search-box::before { content:''; position:absolute; top:0; left:15%; right:15%; height:2px; background:linear-gradient(to right,transparent,var(--gold-bright),transparent); }
.search-label { font-family:'Amiri',serif; font-size:22px; color:var(--gold-pale); margin-bottom:20px; text-align:center; }
.search-input { width:100%; padding:16px 20px; background:rgba(255,255,255,0.06); border:1px solid rgba(196,155,55,0.35); border-radius:3px; color:white; font-family:'Tajawal',sans-serif; font-size:20px; text-align:center; direction:rtl; outline:none; transition:all 0.3s; margin-bottom:16px; }

.search-btn { width:100%; padding:16px; background:linear-gradient(135deg,#b48a2d,#e8c96a,#b48a2d); border:none; border-radius:3px; color:#050e1a; font-family:'Amiri',serif; font-size:22px; font-weight:700; cursor:pointer; transition:all 0.3s; letter-spacing:1px; }
.search-btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(196,155,55,0.35); }
.search-btn:active { transform:translateY(0); }
.result-area { width:100%; max-width:520px; margin-top:24px; }
.result-card { background:rgba(255,255,255,0.04); border:1px solid rgba(196,155,55,0.25); border-radius:4px; padding:24px; margin-bottom:16px; cursor:pointer; transition:all 0.3s; position:relative; }
.result-card::before { content:''; position:absolute; top:0; left:10%; right:10%; height:2px; background:linear-gradient(to right,transparent,rgba(196,155,55,0.5),transparent); }
.result-card:hover { border-color:var(--gold); background:rgba(196,155,55,0.07); transform:translateY(-2px); }
.rc-name { font-family:'Amiri',serif; font-size:24px; color:var(--gold-bright); margin-bottom:8px; }
.rc-level { font-size:15px; color:rgba(196,155,55,0.70); }
.rc-hint { font-size:13px; color:rgba(255,255,255,0.30); margin-top:6px; }
.not-found { text-align:center; padding:30px; background:rgba(200,50,50,0.08); border:1px solid rgba(200,50,50,0.20); border-radius:4px; }
.not-found-icon { font-size:40px; margin-bottom:12px; }

.not-found-sub { font-size:14px; color:rgba(255,255,255,0.35); margin-top:8px; }
.id-page { display:none; min-height:100vh; background:var(--dark); align-items:center; justify-content:center; flex-direction:column; padding:30px 20px; }

.back-btn { display:flex; align-items:center; gap:8px; background:rgba(196,155,55,0.10); border:1px solid rgba(196,155,55,0.30); color:var(--gold); font-family:'Tajawal',sans-serif; font-size:16px; padding:10px 22px; border-radius:3px; cursor:pointer; margin-bottom:28px; transition:all 0.3s; }
.back-btn:hover { background:rgba(196,155,55,0.18); }
.id-card-wrap { display:flex; flex-direction:column; align-items:center; gap:20px; }
.id-card { width:520px; background:linear-gradient(145deg,#050e1a 0%,#0a2035 40%,#0d2d48 70%,#0a2035 100%); border-radius:6px; position:relative; overflow:hidden; box-shadow:0 0 0 1px rgba(196,155,55,0.20),0 0 0 3px rgba(196,155,55,0.08),0 20px 60px rgba(0,0,0,0.7),0 0 80px rgba(196,155,55,0.08); font-family:'Amiri',serif; }

.card-bg { position:absolute; inset:0; z-index:0; pointer-events:none; }
.card-glow { position:absolute; width:400px; height:300px; top:50%; left:50%; transform:translate(-50%,-50%); background:radial-gradient(ellipse,rgba(196,155,55,0.12) 0%,transparent 70%); z-index:0; pointer-events:none; }

.card-border-main  { position:absolute; inset:16px; border:2px solid rgba(196,155,55,0.55); z-index:1; pointer-events:none; }

.card-content { position:relative; z-index:2; padding:32px 36px 28px; display:flex; flex-direction:column; align-items:center; }
.card-bism { font-size:14px; color:rgba(220,185,110,0.55); margin-bottom:10px; letter-spacing:1px; }
.card-divider { display:flex; align-items:center; gap:10px; width:100%; margin-bottom:12px; }

.cdg-sm{width:4px;height:4px;background:rgba(196,155,55,0.5);transform:rotate(45deg);}
.fail-card .cdl-l{background:linear-gradient(to right,transparent,rgba(120,80,180,0.5));}
.fail-card .cdl-r{background:linear-gradient(to left,transparent,rgba(120,80,180,0.5));}

.card-org { font-size:13px; color:rgba(196,155,55,0.55); letter-spacing:2px; margin-bottom:6px; text-align:center; }

.card-id-badge { width:64px;height:64px;border-radius:50%;background:rgba(196,155,55,0.10);border:2px solid rgba(196,155,55,0.45);display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:14px; }

.card-level-badge::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1.5px;background:linear-gradient(to right,transparent,var(--gold-bright),transparent);}
.fail-card .card-level-badge{background:rgba(120,80,180,0.12);border-color:rgba(120,80,180,0.40);color:rgba(180,150,230,0.90);}
.fail-card .card-level-badge::before{background:linear-gradient(to right,transparent,rgba(180,150,230,0.7),transparent);}
.card-info-grid{width:100%;display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.info-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(196,155,55,0.14);padding:8px 14px;border-radius:2px;}

.info-row-label{font-size:13px;color:rgba(196,155,55,0.60);font-family:'Tajawal',sans-serif;flex-shrink:0;}

.info-row-val{font-size:16px;color:rgba(245,228,180,0.90);flex:1;text-align:right;}
.card-footer-verse{font-size:13px;font-style:italic;color:rgba(196,155,55,0.40);text-align:center;margin-top:4px;}
.fail-card .card-footer-verse{color:rgba(120,80,180,0.40);}
.status-banner{border-radius:4px;padding:14px 24px;text-align:center;margin-bottom:16px;width:100%;}
.status-banner.win{background:linear-gradient(135deg,rgba(30,100,50,0.25),rgba(30,100,50,0.10));border:1px solid rgba(80,200,100,0.30);}
.status-banner.lose{background:linear-gradient(135deg,rgba(80,40,120,0.25),rgba(60,30,100,0.10));border:1px solid rgba(140,100,200,0.30);}
.status-icon{font-size:28px;}
.status-text{font-family:'Amiri',serif;font-size:18px;margin-top:4px;}
.status-banner.win .status-text{color:rgba(120,220,140,0.90);}
.status-banner.lose .status-text{color:rgba(180,150,230,0.90);}
.card-corners{position:absolute;inset:0;z-index:1;pointer-events:none;}
.hint-bar{background:rgba(196,155,55,0.08);border:1px solid rgba(196,155,55,0.20);border-radius:4px;padding:12px 20px;text-align:center;font-size:14px;color:rgba(196,155,55,0.70);max-width:520px;width:100%;}

.stats-row{display:flex;gap:12px;width:100%;max-width:520px;margin-bottom:20px;}

.stat-box.green .stat-num{color:rgba(120,220,140,0.90);}
.stat-box.green .stat-lbl{color:rgba(80,200,100,0.55);}
@media(max-width:560px){.id-card{width:100%;}.logo-title{font-size:28px;}}

// ── إحصائيات ──
document.getElementById('statTotal').textContent = S.length;
document.getElementById('statWin').textContent   = S.filter(s=>s.w).length;
document.getElementById('statFail').textContent  = S.filter(s=>!s.w).length;

function N(s){return s.replace(/[أإآا]/g,'ا').replace(/[ةه]/g,'ه').replace(/[يى]/g,'ي').replace(/\s+/g,' ').trim();}

function doSearch(val){
  const q=N(val.trim()), area=document.getElementById('resultArea');
  if(q.length<2){area.innerHTML='';return;}
  const res=S.filter(s=>N(s.name).includes(q));
  if(!res.length){
    area.innerHTML='<div class="not-found"><div class="not-found-icon">🔍</div><div class="not-found-text">الاسم مش موجود في القائمة</div><div class="not-found-sub">تأكد من كتابة الاسم صح أو راجع المنظمين</div></div>';
    return;
  }
  area.innerHTML=res.map(s=>{
    const i=S.indexOf(s);
    const icon=s.w?'🏆':'📋';
    const sub=s.w?'مرشح للتكريم — اضغط لعرض البطاقة':'مشارك — اضغط لعرض البطاقة';
    return `<div class="result-card" onclick="showCard(${i})"><div class="rc-name">${icon} ${s.name}</div><div class="rc-level">📖 ${s.level}</div><div class="rc-hint">${sub}</div></div>`;
  }).join('');
}

function showCard(idx){
  const s=S[idx];
  const card=document.getElementById('theCard');
  const banner=document.getElementById('statusBanner');
  document.getElementById('cardId').textContent=s.id;
  document.getElementById('cardName').textContent=s.name;
  document.getElementById('cardLevel').textContent=s.level;

  if(s.w){
    card.classList.remove('fail-card');
    banner.className='status-banner win';
    document.getElementById('statusIcon').textContent='🏆';
    document.getElementById('statusText').textContent='مبروك! اسمك في قائمة المرشحين للتكريم';
    document.getElementById('cardTitle').textContent='حَفْلُ تَكْرِيمِ حُفَّاظِ الْقُرْآنِ الْكَرِيمِ';
    document.getElementById('cardGlow').className='card-glow';
    document.getElementById('cbo').className='card-border-outer';
    document.getElementById('cbm').className='card-border-main';
    document.getElementById('hintBar').className='hint-bar';
    document.getElementById('hintBar').innerHTML='📸 خد <span style="color:var(--gold);font-weight:500">screenshot</span> للبطاقة دي — هتحتاجها يوم حفل التكريم كارنيه';
    document.getElementById('cardInfo').innerHTML=`
      <div class="info-row"><span class="info-row-icon">📅</span><span class="info-row-label">موعد التكريم</span><span class="info-row-val">${s.date}</span></div>
      <div class="info-row"><span class="info-row-icon">🕌</span><span class="info-row-label">المكان</span><span class="info-row-val">المسجد البحري — قرية قونة</span></div>`;
  } else {
    card.classList.add('fail-card');
    banner.className='status-banner lose';
    document.getElementById('statusIcon').textContent='📖';
    document.getElementById('statusText').textContent='جزاك الله خيراً على مشاركتك — جهدك محفوظ عند الله';
    document.getElementById('cardTitle').textContent='المسابقة السنوية لحفظ القرآن الكريم';
    document.getElementById('cardGlow').className='card-glow fail-glow';
    document.getElementById('cbo').className='card-border-outer fail-b';
    document.getElementById('cbm').className='card-border-main fail-b';
    document.getElementById('hintBar').className='hint-bar fail-hint';
    document.getElementById('hintBar').innerHTML='🌟 الحافظ الصادق لا يضيع جهده — واصل طريقك وشاركنا العام القادم';
    document.getElementById('cardInfo').innerHTML=`
      <div class="info-row"><span class="info-row-icon">📖</span><span class="info-row-label">الحالة</span><span class="info-row-val">شارك ولم يتأهل للتكريم هذا العام</span></div>
      <div class="info-row"><span class="info-row-icon">🕌</span><span class="info-row-label">المسابقة</span><span class="info-row-val">المسجد البحري — قرية قونة</span></div>`;
  }
  document.getElementById('searchPage').style.display='none';
  const p=document.getElementById('idPage');
  p.style.display='flex'; p.classList.add('active');
  drawBg(s.w); window.scrollTo(0,0);
}

function goBack(){
  document.getElementById('searchPage').style.display='';
  const p=document.getElementById('idPage');
  p.classList.remove('active'); p.style.display='none';
}

function drawBg(win){
  const svg=document.getElementById('cardBgSvg'); svg.innerHTML='';
  const ns='http://www.w3.org/2000/svg';
  const col=win?'rgba(196,155,55,0.09)':'rgba(120,80,180,0.09)';
  const vc=win?'rgba(5,14,26,0.8)':'rgba(14,10,20,0.8)';
  function st(cx,cy,R){const r=R*.37;let d='';for(let i=0;i<16;i++){const a=Math.PI/8*i-Math.PI/2,rad=i%2?r:R;d+=(i?'L':'M')+(cx+rad*Math.cos(a)).toFixed(1)+','+(cy+rad*Math.sin(a)).toFixed(1);}return d+'Z';}
  const g=document.createElementNS(ns,'g');g.setAttribute('fill','none');g.setAttribute('stroke',col);g.setAttribute('stroke-width','0.7');
  for(let r=-1;r<10;r++)for(let c=-1;c<14;c++){const p=document.createElementNS(ns,'path');p.setAttribute('d',st(c*40+20,r*40+20,16));g.appendChild(p);}
  svg.appendChild(g);
  const defs=document.createElementNS(ns,'defs'),rg=document.createElementNS(ns,'radialGradient');
  rg.setAttribute('id','cv');rg.setAttribute('cx','50%');rg.setAttribute('cy','50%');rg.setAttribute('r','70%');
  [[0,'rgba(0,0,0,0)'],[1,vc]].forEach(([o,c])=>{const s=document.createElementNS(ns,'stop');s.setAttribute('offset',o);s.setAttribute('stop-color',c);rg.appendChild(s);});
  defs.appendChild(rg);svg.appendChild(defs);
  const rect=document.createElementNS(ns,'rect');rect.setAttribute('x','0');rect.setAttribute('y','0');rect.setAttribute('width','520');rect.setAttribute('height','360');rect.setAttribute('fill','url(#cv)');svg.appendChild(rect);
}
</script>
